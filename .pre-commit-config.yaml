default_language_version:
  python: python3.12

exclude: "docs/index.md"

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # list of supported hooks: https://pre-commit.com/hooks.html
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-docstring-first
      - id: check-yaml
      - id: debug-statements
      - id: detect-private-key
      - id: check-executables-have-shebangs
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: [--maxkb, "800"]

  # python code formatting, linting, and import sorting using ruff
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      # Run the formatter
      - id: ruff-format
      # Run the linter
      - id: ruff-check
        args: ["--fix", "--exit-non-zero-on-fix"]

  # python docstring formatting
  # NOTE: myint/docformatter is abandoned; PyCQA/docformatter is the maintained fork.
  - repo: https://github.com/PyCQA/docformatter
    rev: v1.7.7
    hooks:
      - id: docformatter
        args: [--in-place, --wrap-summaries=110, --wrap-descriptions=110]

  # yaml formatting
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types: [yaml]
        exclude: "environment.yaml"

  # shell scripts linter
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  # md formatting
  # NOTE: additional_dependencies are pinned to exact versions to reduce CI flakiness
  # caused by upstream plugin releases that are incompatible with the mdformat rev
  # below. shfmt-py is pinned alongside mdformat-shfmt so the `shfmt` binary the
  # plugin shells out to is guaranteed present at a known version. When bumping
  # mdformat, verify each plugin version is still compatible.
  - repo: https://github.com/executablebooks/mdformat
    rev: 0.7.22
    hooks:
      - id: mdformat
        args: ["--number"]
        additional_dependencies:
          - mdformat-ruff==0.1.3
          - mdformat-gfm==1.0.0
          - mdformat-gfm-alerts==2.0.0
          - mdformat-tables==1.0.0
          - mdformat_frontmatter==2.0.10
          - mdformat-black==0.1.1
          - mdformat-config==0.2.1
          - mdformat-shfmt==0.2.0
          - mdformat-mkdocs==5.1.4
          - mdformat-toc==0.5.0
          - shfmt-py==3.12.0.2

  # word spelling linter
  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        args:
          - --skip=*.ipynb,*.bib,*.svg,pyproject.toml
          - --ignore-words-list=ehr,crate

  # jupyter notebook cell output clearing
  - repo: https://github.com/kynan/nbstripout
    rev: 0.9.1
    hooks:
      - id: nbstripout

  # jupyter notebook linting with ruff
  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.9.1
    hooks:
      - id: nbqa-ruff
        args: ["--fix"]
      - id: nbqa-ruff-format
        args: ["--line-length=110"]
